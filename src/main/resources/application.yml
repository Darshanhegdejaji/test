server:
  port: 8086
spring:
  application:
    name: due_test_4
  datasource:
    url: jdbc:mysql://localhost:3306/testdb
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: your-client-id
            client-secret: your-client-secret
            scope: openid,profile,email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          keycloak:
            issuer-uri: http://localhost:8080/realms/your-realm-name
            authorization-uri: http://localhost:8080/realms/your-realm-name/protocol/openid-connect/auth
            token-uri: http://localhost:8080/realms/your-realm-name/protocol/openid-connect/token
            user-info-uri: http://localhost:8080/realms/your-realm-name/protocol/openid-connect/userinfo
            jwk-set-uri: http://localhost:8080/realms/your-realm-name/protocol/openid-connect/certs
      resourceserver:
        opaquetoken:
          introspection-uri: http://localhost:8080/realms/your-realm-name/protocol/openid-connect/token/introspect
          client-id: your-client-id
          client-secret: your-client-secret

keycloak:
  auth-server-url: http://localhost:8080
  realm: your-realm-name
  default-role: STUDENT
  admin:
    client-id: your-client-id
    client-secret: your-client-secret